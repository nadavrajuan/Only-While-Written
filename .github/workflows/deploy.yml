name: Deploy to AWS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: 3.122.189.17
          EC2_USER: ubuntu
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

          # Copy files to server
          ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST "mkdir -p ~/only-while-written"
          scp -i ~/.ssh/id_rsa -r * $EC2_USER@$EC2_HOST:~/only-while-written/

          # Deploy with Docker Compose
          ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST << 'ENDSSH'
            cd ~/only-while-written
            docker-compose down
            docker-compose build
            docker-compose up -d
          ENDSSH
